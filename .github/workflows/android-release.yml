name: Android Release
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-slug:
        required: true
        type: string
      application-id:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "21"
      java-distribution:
        required: false
        type: string
        default: "corretto"
      build-gradle-path:
        required: false
        type: string
        default: "app/build.gradle.kts"
      play-track:
        required: false
        type: string
        default: "alpha"
      prerelease:
        required: false
        type: boolean
        default: false
    secrets:
      KEYSTORE:
        required: true
      KEYSTORE_PASSPHRASE:
        required: true
      STORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      PLAY_SERVICE_ACCOUNT_JSON:
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - id: version
        name: Read current version
        run: |
          VERSION_CODE=$(grep "versionCode" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep "versionName" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '"([^"]+)"' | tr -d '"')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" > release.keystore.asc
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSPHRASE }}" --batch release.keystore.asc > release.keystore

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease -PenableApkSplits=false

      - name: Prepare AAB artifact
        run: |
          mkdir -p artifacts
          cp app/build/outputs/bundle/release/app-release.aab \
             "artifacts/${{ inputs.app-slug }}-${{ steps.version.outputs.version_name }}.aab"

      - name: Upload AAB to Google Play
        if: inputs.play-track != '' && inputs.play-track != 'none'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ inputs.application-id }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.play-track }}
          status: completed
          whatsNewDirectory: fastlane/metadata/android

      - name: Clean before APK build
        run: ./gradlew clean

      - name: Build APK splits
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableApkSplits=true -PincludeUniversalApk=true

      - name: Prepare APKs
        run: |
          mkdir -p artifacts
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              arch=$(echo "$apk" | grep -oE '(arm64-v8a|armeabi-v7a|x86_64|x86|universal)')
              if [ -n "$arch" ]; then
                cp "$apk" "artifacts/${{ inputs.app-slug }}-${{ steps.version.outputs.version_name }}-${arch}.apk"
              fi
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          name: ${{ inputs.app-name }} ${{ steps.version.outputs.version_name }}
          tag_name: ${{ steps.version.outputs.version_name }}
          prerelease: ${{ inputs.prerelease }}
