name: Android Release
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-slug:
        required: true
        type: string
      application-id:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "21"
      java-distribution:
        required: false
        type: string
        default: "corretto"
      build-gradle-path:
        required: false
        type: string
        default: "app/build.gradle.kts"
      play-track:
        required: false
        type: string
        default: ""
      play-flavor:
        required: false
        type: string
        default: ""
      prerelease:
        required: false
        type: boolean
        default: false
      generate-release-notes:
        required: false
        type: boolean
        default: true
      auto-bump-version:
        required: false
        type: boolean
        default: false
    secrets:
      KEYSTORE:
        required: true
      KEYSTORE_PASSPHRASE:
        required: true
      STORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      PLAY_SERVICE_ACCOUNT_JSON:
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - id: version
        name: Read current version
        run: |
          VERSION_CODE=$(grep "versionCode" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '[0-9]+')
          VERSION_NAME=$(grep "versionName" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '"([^"]+)"' | tr -d '"')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" > release.keystore.asc
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSPHRASE }}" --batch release.keystore.asc > release.keystore

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease -PenableApkSplits=false

      - name: Prepare AAB artifacts
        run: |
          mkdir -p artifacts
          find app/build/outputs/bundle -name "*.aab" -exec cp {} artifacts/ \;

      - name: Upload AAB to Google Play
        if: inputs.play-track != '' && inputs.play-track != 'none'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ inputs.application-id }}
          releaseFiles: app/build/outputs/bundle/${{ inputs.play-flavor }}Release/app-release.aab
          track: ${{ inputs.play-track }}
          status: completed
          whatsNewDirectory: fastlane/metadata/android

      - name: Clean before APK build
        run: ./gradlew clean

      - name: Build APK splits
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableApkSplits=true -PincludeUniversalApk=true

      - name: Prepare APK artifacts
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" | while IFS= read -r apk; do
            arch=$(echo "$apk" | grep -oE '(arm64-v8a|armeabi-v7a|x86_64|x86|universal)')
            if [ -n "$arch" ]; then
              cp "$apk" "artifacts/${{ inputs.app-slug }}-${{ steps.version.outputs.version_name }}-${arch}.apk"
            fi
          done

      - name: Bump version
        if: inputs.auto-bump-version
        id: bump
        run: |
          OLD_VERSION_CODE=$(grep "versionCode" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '[0-9]+')
          OLD_VERSION_NAME=$(grep "versionName" ${{ inputs.build-gradle-path }} | head -1 | grep -oE '"([^"]+)"' | tr -d '"')

          NEW_VERSION_CODE=$((OLD_VERSION_CODE + 10))

          IFS='.' read -ra VERSION_PARTS <<< "$OLD_VERSION_NAME"
          MINOR=$((VERSION_PARTS[2] + 1))
          VERSION_PARTS[2]=$MINOR
          NEW_VERSION_NAME="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.${VERSION_PARTS[2]}"

          echo "old_version_name=$OLD_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_name=$NEW_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT

          sed -i -E "s/versionCode\s*[= ]\s*$OLD_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" ${{ inputs.build-gradle-path }}
          sed -i -E "s/versionName\s*[= ]\s*\"$OLD_VERSION_NAME\"/versionName = \"$NEW_VERSION_NAME\"/" ${{ inputs.build-gradle-path }}

      - name: Commit version bump
        if: inputs.auto-bump-version
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version_name }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Generate Release Notes
        if: inputs.generate-release-notes
        id: release-notes
        uses: mlm-games/release-notes-generator@main
        with:
          version: ${{ steps.version.outputs.version_name }}
          changelog-path: 'CHANGELOG.md'
          version-file-path: './fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.version_code }}.txt'
          version-code: '${{ steps.version.outputs.version_code }}'
          format: '- {{subject}}'
          exclude-patterns: 'chore:,ci:,docs:,build:,Bump version,Merge pull request,[skip ci]'
          auto-commit: 'false'

      - name: Ensure changelog exists
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          if [ ! -f "fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.version_code }}.txt" ]; then
            echo "" > "fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.version_code }}.txt"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          name: ${{ inputs.app-name }} ${{ steps.version.outputs.version_name }}
          tag_name: ${{ steps.version.outputs.version_name }}
          prerelease: ${{ inputs.prerelease }}
          body_path: ./fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.version_code }}.txt
